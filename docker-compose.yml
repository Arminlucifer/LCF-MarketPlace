services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8001
    ports:
      - "8001:8001"
    volumes:
      - .:/app
    depends_on:
      - db  

  db:
    image: postgres:15-alpine 
    environment:
      POSTGRES_DB: Marketplace_db  
      POSTGRES_USER: postgres  
      POSTGRES_PASSWORD: A0053533038
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data 
volumes:
  postgres_data: 