{% load static %}




        <div class="sidebar pb-3">
            <div class="navbar ">
                <a href="{% url 'home' %}" class="  bg-secondary justify-content-center  container-fluid  ">
                    <h2 class="text-center"> LCF</h2>
                </a>
                <div class="d-flex align-items-center pt-4 pb-4  bg-secondary w-100 px-3 justify-center ">
                    <div class="position-relative">
                        <img class="rounded-circle"{% if request.user.is_authenticated %}
                             src="{{request.user.avatar.url}}"
                             {% else %}
                             src="{%  static 'img/default.png'  %}"
                             {% endif %}
                             alt="" style="width: 40px; height: 40px;">
                        <div class="bg-success rounded-circle border border-2 border-white position-absolute end-0 bottom-0 p-1"></div>
                    </div>
                    <div class="ms-3">
                        {% if request.user.is_authenticated %}
                        <h6 class="mb-0">{{request.user.username}}</h6>
                        <span>{{request.user.role}}</span>

                        {% else %}
                        <a href="{% url 'login' %}"><h6 class="mb-0 pt-1">Unknown</h6></a>

                        {% endif %}
                    </div>
                </div>




                    <a href="{% url 'post_ad' %}" class="btn btn-success rounded-pill mx-4 w-100 ">
                          Sell Your Product!
                    </a>

                <div class="navbar-nav w-100 bg-secondary ">
                    <a href="{% url 'home' %}" class="text-center pt-3 "> <h5 class="text-light  "> All </h5> </a>
                </div>

                {% for item in categories %}

                <div class="navbar-nav w-100 bg-secondary ">
                    <a href="{% url 'home' %}?q={{item.name}}" class="text-center pt-3 "> <h5 class="text-light  "> {{item.name}} </h5> </a>
                </div>

                {% endfor %}

            </div>

        </div>
