{% load static %}
{% if request.user.is_authenticated %}

<!--Navbar Start -->
<nav class="navbar navbar-expand bg-secondary navbar-dark sticky-top px-4 py-0 align-items-center">


    <div class="d-flex align-items-center">
        <a href="{% url 'home' %}" class="navbar-brand d-flex d-lg-none me-4">
            <h2 class="text-primary mb-0">LCF</h2>
        </a>
        <a href="#" class="sidebar-toggler flex-shrink-0 pb-2 ">
            <i class="fa fa-bars pt-2  "></i>
        </a>
    </div>


    <div class="flex-grow-1 d-flex justify-content-center align-items-center">

        <form class="d-flex w-100" method="GET" action="{% url 'home' %}">

            <input class="form-control bg-dark border-0 mx-auto w-100"
                   type="search"
                   placeholder="Search..."
                   name="q"
                   style="max-width: 500px;">
        </form>
    </div>


    <div class="navbar-nav align-items-center ms-auto">
        <div class="nav-item dropdown">
            <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
                <i class="fa fa-bell me-lg-2"></i>
                <span class="d-none d-lg-inline-flex">Notifications</span>
            </a>
            <div class="dropdown-menu dropdown-menu-end bg-secondary border-0 rounded-0 rounded-bottom m-0">
                <a href="#" class="dropdown-item">
                    <h6 class="text-light mb-0">Profile updated</h6>
                    <small>15 minutes ago</small>
                </a>
                <a href="#" class="dropdown-item text-center text-light">See all notifications</a>
            </div>
        </div>
        <div class="nav-item dropdown">
            <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
                <img class="rounded-circle me-lg-2" src="{{request.user.avatar.url}}" style="width: 40px; height: 40px;">
                <span class="d-none d-lg-inline-flex">{{request.user.name}}</span>
            </a>
            <div class="dropdown-menu dropdown-menu-end bg-secondary border-0 rounded-0 rounded-bottom m-0">
                <a href="#" class="dropdown-item text-light">My Profile</a>
                <a href="{% url 'logout' %}" class="dropdown-item text-light">Settings</a>
                <a href="{% url 'logout' %}" class="dropdown-item text-light">Log Out</a>
            </div>
        </div>
    </div>
</nav>


{% else %}


<nav class="navbar navbar-expand bg-secondary navbar-dark sticky-top px-4 py-0">

    <div class="d-flex align-items-center">
        <a href="index.html" class="navbar-brand d-flex d-lg-none me-4">
            <h2 class="text-primary mb-0"><i class="fa fa-user-edit"></i></h2>
        </a>
        <a href="#" class="sidebar-toggler flex-shrink-0">
            <i class="fa fa-bars"></i>
        </a>
    </div>


    <div class="flex-grow-1 d-flex justify-content-center align-items-center">
        <form class="d-flex w-100">
            <input class="form-control bg-dark border-0 mx-auto w-100" type="search" placeholder="Search" style="max-width: 500px;">
        </form>
    </div>


    <div class="navbar-nav align-items-center ms-auto">
        <div class="nav-item">
            <a href="{% url 'login' %}" class="nav-link">
                <img class="rounded-circle me-lg-2" src="{% static 'img/default.png' %}" style="width: 40px; height: 40px;">
                <span class="d-none d-lg-inline-flex">Login</span>
            </a>
        </div>
    </div>
</nav>


{% endif %}
